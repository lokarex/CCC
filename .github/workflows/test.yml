name: Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential

      - name: Build, install, and test
        shell: bash
        run: |
          set -ex
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mingw_bin="$(dirname "$(command -v g++)")"
            export PATH="${mingw_bin}:${PATH}"
          fi

          make release
          make install
          source <(sed -n '/# >>> ccc installer >>>/,/# <<< ccc installer <<</p' ~/.bashrc)

          make clean
          ccc test
